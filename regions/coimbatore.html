<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Coimbatore News</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      background: #f5f5f5;
    }

    .header {
      background: #2c3e50;
      color: white;
      padding: 15px;
      text-align: center;
      font-size: 22px;
    }

    .tabs {
      display: flex;
      background: #34495e;
    }

    .tab {
      flex: 1;
      padding: 12px;
      text-align: center;
      color: white;
      cursor: pointer;
    }

    .tab:hover {
      background: #1abc9c;
    }

    .news-container {
      padding: 15px;
    }

    .news-card {
      background: white;
      margin-bottom: 10px;
      padding: 12px;
      border-radius: 8px;
      box-shadow: 0 2px 5px rgba(0,0,0,0.1);
    }

    .news-card h4 {
      margin: 0 0 5px;
      color: #2c3e50;
    }

    .news-card p {
      margin: 0;
      color: #555;
      font-size: 14px;
    }
  </style>
</head>
<body>

  <!-- HEADER (UNCHANGED) -->
  <div class="header">
    Coimbatore News Portal
  </div>

  <!-- TABS (UNCHANGED) -->
  <div class="tabs">
    <div class="tab" onclick="loadNews()">All</div>
    <div class="tab" onclick="loadNews()">Local</div>
    <div class="tab" onclick="loadNews()">Market</div>
    <div class="tab" onclick="loadNews()">Weather</div>
  </div>

  <!-- ONLY NEWS CHANGES -->
  <div id="news-container" class="news-container"></div>

  <script>
    const coimbatoreNews = [
      {title:"Rain in Coimbatore",summary:"Light rain reported across city areas."},
      {title:"Traffic Congestion",summary:"Heavy traffic near Gandhipuram."},
      {title:"Metro Plan Update",summary:"Metro rail project discussion continues."},
      {title:"IT Park Expansion",summary:"New IT companies entering Coimbatore."},
      {title:"Water Supply Issue",summary:"Water disruption in some areas."},
      {title:"Temple Festival",summary:"Marudamalai temple sees large crowd."},
      {title:"Bus Delay",summary:"City buses delayed due to rain."},
      {title:"Health Camp",summary:"Free medical camp organized."},
      {title:"Power Cut",summary:"Scheduled maintenance announced."},
      {title:"Farmers Market",summary:"Uzhavar Sandhai sees heavy sales."},

      {title:"New Flyover Plan",summary:"Proposal for new flyover approved."},
      {title:"Police Patrol",summary:"Increased security in city zones."},
      {title:"Library Opening",summary:"New public library opened."},
      {title:"Gold Price Drop",summary:"Gold prices slightly reduced."},
      {title:"Job Fair",summary:"Mega job fair this weekend."},
      {title:"Weather Alert",summary:"Rain forecast for next 3 days."},
      {title:"Sports Event",summary:"District sports meet begins."},
      {title:"Clean City Drive",summary:"Corporation starts cleaning drive."},
      {title:"Mall Opening",summary:"New shopping mall inaugurated."},
      {title:"College Event",summary:"Tech fest conducted in college."},

      {title:"Traffic Diversion",summary:"Road work causes diversions."},
      {title:"Milk Price Rise",summary:"Price increased by ₹2."},
      {title:"Water Tank Repair",summary:"Repair work in progress."},
      {title:"Festival Security",summary:"Extra police deployed."},
      {title:"Train Delay",summary:"Trains delayed due to rain."},
      {title:"Farmer Protest",summary:"Farmers demand better prices."},
      {title:"ATM Installed",summary:"New ATM near RS Puram."},
      {title:"Hospital Upgrade",summary:"GH gets new equipment."},
      {title:"Tree Plantation",summary:"Drive held in schools."},
      {title:"Petrol Price",summary:"Prices remain steady."},

      {title:"Airport Expansion",summary:"Expansion work underway."},
      {title:"New Park Opened",summary:"Park opened in Saibaba Colony."},
      {title:"Bus Pass Online",summary:"Students can renew passes."},
      {title:"Heavy Rain Alert",summary:"IMD issues warning."},
      {title:"Railway Update",summary:"New train timings announced."},
      {title:"Market Rush",summary:"Crowd increases in markets."},
      {title:"Food Safety Check",summary:"Hotel inspections conducted."},
      {title:"Online Services",summary:"Civic services go digital."},
      {title:"LED Lights",summary:"New street lights installed."},
      {title:"Bank Holiday",summary:"Banks closed tomorrow."},

      {title:"Bridge Construction",summary:"New bridge work approved."},
      {title:"School Reopen",summary:"Schools reopen after break."},
      {title:"Dam Water Rise",summary:"Siruvani water level increases."},
      {title:"Bus Stand Upgrade",summary:"Renovation begins."},
      {title:"Taxi Strike",summary:"Drivers plan strike."},
      {title:"Electric Bus Trial",summary:"Trial runs successful."},
      {title:"Health Awareness",summary:"Dengue awareness drive."},
      {title:"Accident Report",summary:"Minor accident on Avinashi road."},
      {title:"New Course",summary:"College launches new program."},
      {title:"Festival Holiday",summary:"Holiday announced in district."}
    ];

    function loadNews() {
      const container = document.getElementById("news-container");
      container.innerHTML = "";

      coimbatoreNews.forEach(news => {
        const div = document.createElement("div");
        div.className = "news-card";

        div.innerHTML = `
          <h4>${news.title}</h4>
          <p>${news.summary}</p>
        `;

        container.appendChild(div);
      });
    }

    window.onload = loadNews;
  </script>

</body>
</html>
