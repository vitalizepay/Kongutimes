<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Coimbatore - News</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #12002b;
  color: white;
}

/* HEADER (UNCHANGED STYLE) */
.header {
  background: #2b0a4a;
  padding: 15px;
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.logo {
  font-weight: bold;
}

.tabs {
  display: flex;
  gap: 20px;
  background: #3d1766;
  padding: 10px 20px;
}

.tabs a {
  color: white;
  text-decoration: none;
}

/* PAGE TITLE */
.page-title {
  padding: 40px 20px;
}

.page-title h1 {
  margin: 0;
  font-size: 40px;
}

/* NEWS SECTION */
.news-container {
  background: white;
  color: black;
  padding: 20px;
}

.news-item {
  padding: 12px;
  border-bottom: 1px solid #ddd;
}

.news-item h4 {
  margin: 0;
  font-size: 16px;
}

.news-item p {
  margin: 5px 0 0;
  font-size: 13px;
  color: #555;
}
</style>

</head>
<body>

<!-- HEADER -->
<div class="header">
  <div class="logo">The Kongu Times</div>
  <div>April 13, 2026</div>
</div>

<!-- TABS -->
<div class="tabs">
  <a href="#">Home</a>
  <a href="#">Candidates 2026</a>
  <a href="#">Erode</a>
  <a href="#"><b>Coimbatore</b></a>
  <a href="#">Tiruppur</a>
  <a href="#">Salem</a>
</div>

<!-- TITLE -->
<div class="page-title">
  <h1>Coimbatore</h1>
  <p>Manchester of South India</p>
</div>

<!-- NEWS SECTION -->
<div class="news-container">
  <h2>Latest News</h2>
  <div id="news-list"></div>
</div>

<script>
const newsData = [
  "Metro Phase 1 approved",
  "Textile exports rise",
  "New IT park announced",
  "Water project launched",
  "Airport expansion ongoing",
  "Startup ecosystem grows",
  "Smart roads initiative",
  "Electric buses added",
  "Real estate boom",
  "New flyover planned",
  "Rainwater harvesting drive",
  "Hospital upgrade",
  "Pollution control measures",
  "New colleges approved",
  "Tourism boost",
  "EV stations increase",
  "Digital governance rollout",
  "Waste management upgrade",
  "Rail connectivity improved",
  "Election campaigns heat up",
  "AI startups emerging",
  "Industrial corridor update",
  "Women entrepreneurs rise",
  "Solar adoption grows",
  "Traffic plan announced",
  "Health camps organized",
  "Lake restoration project",
  "Transport upgrade",
  "Food inspections increase",
  "Startup summit hosted",
  "Farm market boost",
  "Skill programs expand",
  "Cyber awareness drive",
  "Smart city phase 2",
  "New malls planned",
  "Road widening works",
  "Tourism increases",
  "Park renovation",
  "IT exports rise",
  "Housing schemes launched",
  "Electric auto subsidies",
  "Flood prevention plan",
  "New police stations",
  "Clean city ranking improves",
  "Logistics hub proposed",
  "Cargo expansion",
  "Education reforms",
  "Industrial jobs rise",
  "Digital payments grow",
  "City branding campaign"
];

const container = document.getElementById("news-list");

newsData.forEach((item, index) => {
  const div = document.createElement("div");
  div.className = "news-item";

  div.innerHTML = `
    <h4>${index + 1}. ${item}</h4>
    <p>Short update about ${item.toLowerCase()} in Coimbatore.</p>
  `;

  container.appendChild(div);
});
</script>

</body>
</html>
