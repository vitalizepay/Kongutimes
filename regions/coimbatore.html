<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kongu Times</title>

<link rel="stylesheet" href="styles.css">
</head>

<body>

<!-- HEADER -->
<header class="header">
  <div class="container flex space-between">
    <div class="logo">Kongu Times</div>

    <div class="lang-switch">
      <button>தமிழ்</button>
      <button class="active">English</button>
    </div>
  </div>
</header>

<!-- NAVIGATION -->
<nav class="nav">
  <div class="container">
    <ul class="nav-list">
      <li><a href="/">Home</a></li>
      <li><a href="/candidates">Candidates 2026</a></li>
      <li><a href="/coimbatore">Coimbatore</a></li>
      <li><a href="/tiruppur">Tiruppur</a></li>
      <li><a href="/salem">Salem</a></li>
    </ul>
  </div>
</nav>

<!-- BREAKING / LIVE -->
<section class="breaking">
  <div class="container">
    <span class="live">LIVE</span>
    <marquee id="breaking-news">
      Loading latest updates...
    </marquee>
  </div>
</section>

<!-- HERO NEWS -->
<section class="hero-news container" id="hero-news">
  <!-- dynamically injected main headline -->
</section>

<!-- MAIN CONTENT -->
<main class="container main-grid">

  <!-- LEFT COLUMN (News List) -->
  <section class="news-list" id="news-list">
    <!-- dynamic news cards -->
  </section>

  <!-- RIGHT SIDEBAR -->
  <aside class="sidebar">

    <!-- Trending -->
    <div class="widget">
      <h3>Trending</h3>
      <ul id="trending-list"></ul>
    </div>

    <!-- Election Widget -->
    <div class="widget election">
      <h3>Election 2026</h3>
      <p>Polling: Apr 23</p>
      <p>Counting: May 4</p>
    </div>

  </aside>

</main>

<!-- FOOTER -->
<footer class="footer">
  <div class="container">
    <p>© 2026 Kongu Times</p>
  </div>
</footer>

<!-- JS FOR DYNAMIC CONTENT -->
<script>
/* Example dynamic data (replace with API later) */

const newsData = [
  {
    title: "Coimbatore South: DMK vs AIADMK vs TVK",
    desc: "Major 2026 political battle intensifies",
    image: "https://via.placeholder.com/400"
  },
  {
    title: "Textile sector growth in Coimbatore",
    desc: "Exports see 12% rise this quarter",
    image: "https://via.placeholder.com/400"
  }
];

const trending = [
  "Election 2026",
  "Coimbatore News",
  "DMK vs AIADMK",
  "Tamil Nadu Politics"
];

/* HERO */
document.getElementById("hero-news").innerHTML = `
  <div class="hero-card">
    <img src="${newsData[0].image}">
    <h1>${newsData[0].title}</h1>
    <p>${newsData[0].desc}</p>
  </div>
`;

/* NEWS LIST */
const newsList = document.getElementById("news-list");

newsData.forEach(news => {
  newsList.innerHTML += `
    <div class="news-card">
      <img src="${news.image}">
      <div>
        <h3>${news.title}</h3>
        <p>${news.desc}</p>
      </div>
    </div>
  `;
});

/* TRENDING */
const trendingList = document.getElementById("trending-list");

trending.forEach(item => {
  trendingList.innerHTML += `<li>${item}</li>`;
});

/* BREAKING */
document.getElementById("breaking-news").innerText =
  "Coimbatore Election heats up • New alliances forming • Live updates coming...";
</script>

</body>
</html>
