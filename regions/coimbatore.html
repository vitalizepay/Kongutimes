<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Erode News</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      background: #f5f5f5;
    }

    /* HEADER (UNCHANGED) */
    .header {
      background: #2c3e50;
      color: white;
      padding: 15px;
      text-align: center;
      font-size: 22px;
    }

    /* TABS (UNCHANGED) */
    .tabs {
      display: flex;
      background: #34495e;
    }

    .tab {
      flex: 1;
      padding: 12px;
      text-align: center;
      color: white;
      cursor: pointer;
    }

    .tab:hover {
      background: #1abc9c;
    }

    /* NEWS SECTION (ONLY THIS UPDATES) */
    .news-container {
      padding: 15px;
    }

    .news-card {
      background: white;
      margin-bottom: 10px;
      padding: 12px;
      border-radius: 8px;
      box-shadow: 0 2px 5px rgba(0,0,0,0.1);
    }

    .news-card h4 {
      margin: 0 0 5px;
      color: #2c3e50;
    }

    .news-card p {
      margin: 0;
      color: #555;
      font-size: 14px;
    }
  </style>
</head>
<body>

  <!-- HEADER (DO NOT CHANGE) -->
  <div class="header">
    Erode News Portal
  </div>

  <!-- TABS (DO NOT CHANGE) -->
  <div class="tabs">
    <div class="tab" onclick="loadNews()">All</div>
    <div class="tab" onclick="loadNews()">Local</div>
    <div class="tab" onclick="loadNews()">Market</div>
    <div class="tab" onclick="loadNews()">Weather</div>
  </div>

  <!-- ONLY THIS SECTION CHANGES -->
  <div id="news-container" class="news-container"></div>

  <script>
    const erodeNews = [
      {title:"Rain in Erode",summary:"Light showers reported in parts of Erode."},
      {title:"Market Prices Rise",summary:"Turmeric prices increase in Erode market."},
      {title:"New Road Work",summary:"Road repair work begins near Perundurai."},
      {title:"School Event",summary:"Annual day celebrated in local school."},
      {title:"Water Supply Issue",summary:"Temporary disruption in water supply reported."},
      {title:"Temple Festival",summary:"Local temple festival attracts large crowd."},
      {title:"Traffic Update",summary:"Heavy traffic near Erode bus stand."},
      {title:"Health Camp",summary:"Free medical camp organized in Erode."},
      {title:"Power Cut Notice",summary:"Scheduled power cut announced."},
      {title:"Farmer Support",summary:"Government announces support for farmers."},

      {title:"New Bus Route",summary:"New bus route introduced."},
      {title:"Police Alert",summary:"Police increase patrolling."},
      {title:"Library Opening",summary:"New library inaugurated."},
      {title:"Gold Prices Drop",summary:"Gold prices fall slightly."},
      {title:"Job Fair",summary:"Job fair this weekend."},
      {title:"Rain Forecast",summary:"More rain expected this week."},
      {title:"Sports Meet",summary:"District sports meet begins."},
      {title:"Cleanup Drive",summary:"City cleanup drive started."},
      {title:"New Shops",summary:"New shops open in city."},
      {title:"College Seminar",summary:"Seminar held in college."},

      {title:"Traffic Diversion",summary:"Diversions due to road work."},
      {title:"Milk Price Hike",summary:"Milk price increased."},
      {title:"Water Tank Repair",summary:"Repair work ongoing."},
      {title:"Festival Security",summary:"Extra police deployed."},
      {title:"Bus Delay",summary:"Buses delayed due to rain."},
      {title:"Farmer Protest",summary:"Farmers protest price issues."},
      {title:"New ATM",summary:"ATM installed in main road."},
      {title:"Hospital Upgrade",summary:"New equipment added."},
      {title:"Tree Plantation",summary:"Trees planted in schools."},
      {title:"Petrol Price",summary:"Petrol price unchanged."},

      {title:"Metro Proposal",summary:"Metro discussed for future."},
      {title:"New Park",summary:"Park opened for public."},
      {title:"Bus Pass Update",summary:"Online renewal available."},
      {title:"Heavy Rain Alert",summary:"Alert issued for rain."},
      {title:"Railway Update",summary:"Train timings changed."},
      {title:"Market Crowd",summary:"Heavy crowd in market."},
      {title:"Food Safety Check",summary:"Hotels inspected."},
      {title:"Online Services",summary:"Services now online."},
      {title:"Street Lights",summary:"LED lights installed."},
      {title:"Bank Holiday",summary:"Banks closed tomorrow."},

      {title:"New Bridge Plan",summary:"Bridge plan approved."},
      {title:"School Reopening",summary:"Schools reopen."},
      {title:"Water Level Rise",summary:"Dam water level rises."},
      {title:"Bus Stand Upgrade",summary:"Renovation starts."},
      {title:"Taxi Strike",summary:"Drivers announce strike."},
      {title:"Electric Bus Trial",summary:"Electric buses tested."},
      {title:"Health Alert",summary:"Dengue awareness drive."},
      {title:"Road Accident",summary:"Minor accident reported."},
      {title:"New Course",summary:"College adds new course."},
      {title:"Festival Holiday",summary:"Holiday declared."}
    ];

    function loadNews() {
      const container = document.getElementById("news-container");
      container.innerHTML = "";

      erodeNews.forEach(news => {
        const div = document.createElement("div");
        div.className = "news-card";

        div.innerHTML = `
          <h4>${news.title}</h4>
          <p>${news.summary}</p>
        `;

        container.appendChild(div);
      });
    }

    // Load news on page load
    window.onload = loadNews;
  </script>

</body>
</html>
