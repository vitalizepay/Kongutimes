<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Kongu Times - Regions</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #0f0f1a;
  color: white;
}

/* HEADER */
.header {
  background: #1a1a2e;
  padding: 15px;
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.tabs {
  display: flex;
  gap: 15px;
}

.tabs a {
  color: #ccc;
  text-decoration: none;
  padding: 8px 12px;
  border-radius: 6px;
}

.tabs a:hover {
  background: #333;
  color: white;
}

/* NEWS SECTION */
.news-section {
  padding: 20px;
}

#region-title {
  margin-bottom: 20px;
}

/* NEWS CARD */
.news-card {
  background: #1e1e2f;
  padding: 15px;
  margin-bottom: 10px;
  border-radius: 10px;
  transition: 0.2s;
}

.news-card:hover {
  background: #29294a;
}

.news-card h3 {
  margin: 0 0 5px;
}

.news-card p {
  margin: 0 0 5px;
  font-size: 14px;
  opacity: 0.8;
}

.news-card span {
  font-size: 12px;
  color: #aaa;
}
</style>
</head>

<body>

<!-- HEADER (UNCHANGED STYLE) -->
<div class="header">
  <h2>Kongu Times</h2>

  <div class="tabs">
    <a href="#" data-region="tiruppur">Tiruppur</a>
    <a href="#" data-region="erode">Erode</a>
    <a href="#" data-region="coimbatore">Coimbatore</a>
    <a href="#" data-region="salem">Salem</a>
  </div>
</div>

<!-- NEWS SECTION -->
<section class="news-section">
  <h2 id="region-title">Latest News</h2>
  <div id="news-container"></div>
</section>

<script>
/* =========================
   NEWS DATA (50 each)
========================= */
function generateNews(region) {
  return Array.from({ length: 50 }, (_, i) => ({
    title: `${region.toUpperCase()} News ${i + 1}`,
    desc: `Short update about ${region} event ${i + 1}.`,
    time: "Today"
  }));
}

const newsData = {
  tiruppur: generateNews("tiruppur"),
  erode: generateNews("erode"),
  coimbatore: generateNews("coimbatore"),
  salem: generateNews("salem")
};

/* =========================
   LOAD NEWS FUNCTION
========================= */
function loadNews(region) {
  const container = document.getElementById("news-container");
  const title = document.getElementById("region-title");

  container.innerHTML = "";
  title.innerText = region.toUpperCase() + " NEWS";

  const newsList = newsData[region] || [];

  newsList.forEach(news => {
    const item = document.createElement("div");
    item.className = "news-card";

    item.innerHTML = `
      <h3>${news.title}</h3>
      <p>${news.desc}</p>
      <span>${news.time}</span>
    `;

    container.appendChild(item);
  });
}

/* =========================
   TAB CLICK (NO RELOAD)
========================= */
document.querySelectorAll(".tabs a").forEach(tab => {
  tab.addEventListener("click", (e) => {
    e.preventDefault();
    const region = tab.dataset.region;

    loadNews(region);

    // update URL (optional)
    history.pushState(null, "", `#${region}`);
  });
});

/* =========================
   LOAD BASED ON URL
========================= */
function detectRegion() {
  const hash = window.location.hash.replace("#", "");
  return hash || "tiruppur";
}

/* =========================
   INITIAL LOAD
========================= */
window.onload = () => {
  const region = detectRegion();
  loadNews(region);
};
</script>

</body>
</html>
