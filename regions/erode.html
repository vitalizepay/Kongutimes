<div id="news-container"></div>
<script>
const newsData = [
    {title: "Textile exports show strong growth", desc: "Export demand increases across markets"},
    {title: "New flyover project approved", desc: "Traffic congestion expected to reduce soon"},
    {title: "Startups attract investments", desc: "Tech companies receive new funding"},
    {title: "Agriculture output rises", desc: "Farmers report better yield this season"},
    {title: "Industrial park planned", desc: "Thousands of jobs expected to be created"},
    {title: "Transport services expanded", desc: "More buses introduced for public"},
    {title: "Healthcare upgraded", desc: "Hospitals receive modern equipment"},
    {title: "Retail markets busy", desc: "Weekend shoppers increase"},
    {title: "Road repairs begin", desc: "Highway maintenance underway"},
    {title: "Digital learning adopted", desc: "Schools introduce smart classes"},
    {title: "Power supply stabilized", desc: "Improved infrastructure reduces outages"},
    {title: "Water conservation improves", desc: "New projects boost water levels"},
    {title: "IT hiring increases", desc: "Companies expand workforce"},
    {title: "New shopping complex opens", desc: "Attracts visitors and businesses"},
    {title: "Digital payments grow", desc: "Cashless economy expanding"},
    {title: "Solar energy expands", desc: "Renewable adoption increases"},
    {title: "Sports training camps begin", desc: "Teams prepare for tournaments"},
    {title: "Waste management improves", desc: "Cleanliness initiatives succeed"},
    {title: "Real estate demand rises", desc: "Suburban housing increases"},
    {title: "Tourism sees growth", desc: "More visitors during weekends"},
];

// Fill up to 50 automatically
while (newsData.length < 50) {
    newsData.push({
        title: "Latest update " + newsData.length,
        desc: "Breaking news content " + newsData.length
    });
}

const container = document.getElementById("news-container");

newsData.forEach((news) => {
    const card = document.createElement("div");
    card.className = "news-card";

    card.innerHTML = `
        <div class="news-title">${news.title}</div>
        <div class="news-desc">${news.desc}</div>
        <div class="news-date">April 13, 2026</div>
    `;

    container.appendChild(card);
});
</script>
<style>
.news-card {
    background: #1c0a3a;
    margin: 10px 0;
    padding: 15px;
    border-radius: 8px;
}

.news-title {
    font-weight: bold;
    margin-bottom: 5px;
}

.news-desc {
    color: #ccc;
    font-size: 14px;
}

.news-date {
    font-size: 12px;
    color: #888;
}
</style>
